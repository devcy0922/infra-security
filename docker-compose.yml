version: "3.9"

# =============================================================
# infra-security — 핵심 서비스 스택
#
# Observability(Prometheus / Grafana / Loki / Nginx)는
# 기존 ai-service-infra 스택을 공유한다.
# 연동 방법: monitoring/README.md 참고
# =============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

networks:
  # 이 스택 내부 통신망
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # 외부 직접 접근 차단
  kc-cluster:
    driver: bridge
    internal: true   # Keycloak 클러스터 내부망

  # ai-service-infra 의 외부 네트워크를 연결
  # 해당 스택이 먼저 기동되어 있어야 함
  infra-monitoring:
    external: true
    name: ${INFRA_MONITORING_NETWORK:-ai-service-infra_monitoring}

volumes:
  mariadb-writer-data:
  mariadb-reader-data:
  mariadb-kc-data:
  proxysql-data:

# =============================================================
# Services
# =============================================================
services:

  # -----------------------------------------------------------
  # MariaDB — 레거시 앱 Writer (Primary)
  # -----------------------------------------------------------
  mariadb-writer:
    image: mariadb:11.4
    container_name: infrasec-mariadb-writer
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-writer-data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro
      - ./mariadb/seed:/seed:ro
      - ./mariadb/conf/writer.cnf:/etc/mysql/conf.d/writer.cnf:ro
    networks:
      - backend
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # -----------------------------------------------------------
  # MariaDB — 레거시 앱 Reader (Replica)
  # -----------------------------------------------------------
  mariadb-reader:
    image: mariadb:11.4
    container_name: infrasec-mariadb-reader
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_READER_PASSWORD}
    volumes:
      - mariadb-reader-data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro
      - ./mariadb/conf/reader.cnf:/etc/mysql/conf.d/reader.cnf:ro
    networks:
      - backend
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mariadb-writer:
        condition: service_healthy
    logging: *default-logging

  # -----------------------------------------------------------
  # MariaDB — Keycloak 전용 DB
  # -----------------------------------------------------------
  mariadb-kc:
    image: mariadb:11.4
    container_name: infrasec-mariadb-kc
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${KC_DB_DATABASE}
      MARIADB_USER: ${KC_DB_USER}
      MARIADB_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - mariadb-kc-data:/var/lib/mysql
      - ./mariadb/conf/keycloak.cnf:/etc/mysql/conf.d/keycloak.cnf:ro
    networks:
      - kc-cluster
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # -----------------------------------------------------------
  # ProxySQL — DB 미들웨어 + 감사 로깅
  # -----------------------------------------------------------
  proxysql:
    image: proxysql/proxysql:2.6.5
    container_name: infrasec-proxysql
    restart: unless-stopped
    volumes:
      - ./proxysql/conf/proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql-data:/var/lib/proxysql
      - ./proxysql/logs:/var/log/proxysql
    networks:
      - frontend
      - backend
      - infra-monitoring    # Promtail이 로그 수집할 수 있도록
    ports:
      - "6033:6033"   # MySQL 프로토콜 (앱 연결)
      - "6032:6032"   # Admin 인터페이스
    depends_on:
      mariadb-writer:
        condition: service_healthy
      mariadb-reader:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "-h", "127.0.0.1", "-P", "6032", "-u", "${PROXYSQL_ADMIN_USER}", "-p${PROXYSQL_ADMIN_PASS}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # -----------------------------------------------------------
  # Keycloak Node 1
  # -----------------------------------------------------------
  keycloak-1:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: infrasec-keycloak-1
    restart: unless-stopped
    command:
      - start
      - --cache=ispn
      - --cache-stack=tcp
      - --cache-config-file=/opt/keycloak/conf/cache-ispn.xml
      - --db=mariadb
      - --db-url=jdbc:mariadb://${KC_DB_HOST}:${KC_DB_PORT}/${KC_DB_DATABASE}
      - --db-username=${KC_DB_USER}
      - --db-password=${KC_DB_PASSWORD}
      - --hostname=${KC_HOSTNAME}
      - --hostname-strict=false
      - --http-enabled=true
      - --proxy=edge
      - --log-level=INFO
      - --metrics-enabled=true
      - --health-enabled=true
    environment:
      KC_ADMIN: ${KC_ADMIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      JGROUPS_BIND_ADDR: keycloak-1
      KC_CACHE_STACK: tcp
    volumes:
      - ./keycloak/conf/cache-ispn.xml:/opt/keycloak/conf/cache-ispn.xml:ro
      - ./keycloak/conf/keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
      - ./keycloak/providers/custom-user-spi/target/custom-user-spi.jar:/opt/keycloak/providers/custom-user-spi.jar:ro
    networks:
      - frontend
      - kc-cluster
      - backend
      - infra-monitoring    # Prometheus 스크랩 허용
    depends_on:
      mariadb-kc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  # -----------------------------------------------------------
  # Keycloak Node 2
  # -----------------------------------------------------------
  keycloak-2:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: infrasec-keycloak-2
    restart: unless-stopped
    command:
      - start
      - --cache=ispn
      - --cache-stack=tcp
      - --cache-config-file=/opt/keycloak/conf/cache-ispn.xml
      - --db=mariadb
      - --db-url=jdbc:mariadb://${KC_DB_HOST}:${KC_DB_PORT}/${KC_DB_DATABASE}
      - --db-username=${KC_DB_USER}
      - --db-password=${KC_DB_PASSWORD}
      - --hostname=${KC_HOSTNAME}
      - --hostname-strict=false
      - --http-enabled=true
      - --proxy=edge
      - --log-level=INFO
      - --metrics-enabled=true
      - --health-enabled=true
    environment:
      KC_ADMIN: ${KC_ADMIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      JGROUPS_BIND_ADDR: keycloak-2
      KC_CACHE_STACK: tcp
    volumes:
      - ./keycloak/conf/cache-ispn.xml:/opt/keycloak/conf/cache-ispn.xml:ro
      - ./keycloak/conf/keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
      - ./keycloak/providers/custom-user-spi/target/custom-user-spi.jar:/opt/keycloak/providers/custom-user-spi.jar:ro
    networks:
      - frontend
      - kc-cluster
      - backend
      - infra-monitoring    # Prometheus 스크랩 허용
    depends_on:
      keycloak-1:
        condition: service_healthy
      mariadb-kc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  # -----------------------------------------------------------
  # Nginx — Keycloak HA 로드밸런서 + TLS 종단
  # (Grafana/Prometheus 앞단 Nginx와 별도 — KC 전용)
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: infrasec-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - frontend
    ports:
      - "8443:443"   # 기존 인프라 443 충돌 방지 → 8443 사용
      - "8080:80"
    depends_on:
      keycloak-1:
        condition: service_healthy
    logging: *default-logging
