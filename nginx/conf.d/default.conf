server {
    listen 80;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Keycloak HA 업스트림으로 로드밸런싱
    location /auth/ {
        proxy_pass          http://keycloak_ha;
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_set_header    X-Forwarded-Port    $server_port;

        # Keycloak 세션 스티키 (같은 노드 유지 — Infinispan 이전 임시)
        proxy_cookie_path   / "/; SameSite=None; Secure";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffer_size   128k;
        proxy_buffers       8 128k;
    }

    # 헬스체크
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

upstream keycloak_ha {
    # least_conn: 활성 연결 수 기반 라우팅
    least_conn;

    server keycloak-1:8080 max_fails=3 fail_timeout=10s;
    server keycloak-2:8080 max_fails=3 fail_timeout=10s;

    keepalive 32;
}
